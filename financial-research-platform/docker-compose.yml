version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./reports:/app/reports
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  celery_worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./reports:/app/reports
    command: celery -A app.services.celery_app worker --loglevel=info --concurrency=4

  celery_flower:
    build: .
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    command: celery -A app.services.celery_app flower --port=5555

volumes:
  postgres_data:
  chroma_data:
